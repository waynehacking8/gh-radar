name: gh-radar

# Runs on GitHub's servers (your laptop can be off). Collects trending GitHub
# tools from GitHub Trending + Hacker News + GitHub Search, emails you a ranked
# digest, commits a browsable copy to digests/, and persists the de-dup memory
# in state/ so you never see the same repo twice.
#
# One-time setup — Repo → Settings → Secrets and variables → Actions → add:
#   GMAIL_USER               your gmail address      (required for email)
#   GMAIL_APP_PASSWORD       a Gmail App Password     (required for email)
#   CLAUDE_CODE_OAUTH_TOKEN  `claude setup-token`     (optional — enables the
#                            Traditional-Chinese summaries; English-only without it)
# GITHUB_TOKEN is provided automatically by Actions (lifts API limit to 5000/hr).

on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC daily (08:00 Taipei)
  workflow_dispatch: {}    # also runnable on-demand from the Actions tab

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude CLI (for the Chinese summaries)
        # Non-fatal: if this fails, radar.py degrades to English-only and the
        # email still goes out. The Chinese layer is a nice-to-have, not a gate.
        continue-on-error: true
        run: npm install -g @anthropic-ai/claude-code

      - name: Collect signal + email digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Optional sources — self-disable if the secret is unset:
          TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}     # X (twitterapi.io)
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}       # Reddit
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.GMAIL_USER }}
          SMTP_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: waynehacking8@users.noreply.github.com
          GH_RADAR_HOME: state            # de-dup memory -> state/seen.json
          GH_RADAR_DIGEST_DIR: digests     # browsable archive -> digests/*.md
        run: python radar.py

      - name: Commit digest archive + de-dup memory
        run: |
          git config user.name "gh-radar[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add -f digests/ state/
          git commit -m "radar: digest for $(date -u +%F)" || { echo "nothing new"; exit 0; }
          git push
