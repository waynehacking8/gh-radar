name: gh-radar

# Runs on GitHub's servers (your laptop can be off). Collects trending GitHub
# tools from GitHub Trending + Hacker News + GitHub Search, emails you a ranked
# digest, commits a browsable copy to digests/, and persists the de-dup memory
# in state/ so you never see the same repo twice.
#
# One-time setup — Repo → Settings → Secrets and variables → Actions → add:
#   GMAIL_USER               your gmail address      (required for email)
#   GMAIL_APP_PASSWORD       a Gmail App Password     (required for email)
#   CLAUDE_CODE_OAUTH_TOKEN  `claude setup-token`     (optional — enables the
#                            Traditional-Chinese summaries; English-only without it)
# GITHUB_TOKEN is provided automatically by Actions (lifts API limit to 5000/hr).

on:
  schedule:
    # Multi-window FALLBACK. A single daily cron isn't reliable here: GitHub cron
    # on this account lags 3–6h (measured on content-radar) and silently DROPS
    # fires in congested slots — and a brand-new repo's first scheduled fires are
    # skipped entirely. So fire every 30 min across 01:00–07:30 UTC (09:00–15:30
    # Taipei), off the congested midnight band. The daily sentinel (state/last-run,
    # checked in cli.main) makes every fire after the first of the day a no-op —
    # one digest/day; the extra fires only guarantee at least one actually lands.
    - cron: "*/30 1-7 * * *"
  workflow_dispatch: {}    # also runnable on-demand from the Actions tab

permissions:
  contents: write

# A late fire must not overlap the next window's fire (double email + push race).
# Serialize on a single group; let an in-flight run finish rather than cancel it.
concurrency:
  group: gh-radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so the pre-push rebase has a real merge
                           # base; a shallow (depth-1) checkout makes rebase graft
                           # badly and conflict on its own commit.

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install Claude CLI (for the Chinese summaries)
        # Non-fatal: if this fails, radar.py degrades to English-only and the
        # email still goes out. The Chinese layer is a nice-to-have, not a gate.
        continue-on-error: true
        run: npm install -g @anthropic-ai/claude-code

      - name: Collect signal + email digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # X + web sources scrape via Firecrawl (free, keyless). A key only raises
          # limits when you scale — self-disables nothing if unset:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}       # Reddit (optional)
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.GMAIL_USER }}
          SMTP_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GH_RADAR_HOME: state            # de-dup memory -> state/seen.json
          GH_RADAR_DIGEST_DIR: digests     # browsable archive -> digests/*.md
        run: python radar.py

      - name: Commit digest archive + de-dup memory
        run: |
          git config user.name "gh-radar[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add -f digests/ state/
          git commit -m "radar: digest for $(date -u +%F)" || { echo "nothing new"; exit 0; }
          # Rebase before push so a concurrent commit (a manual dispatch overlapping
          # the scheduled run, or a hand push) doesn't fail the job with a spurious
          # non-fast-forward. state/seen.json is a single-line JSON and can't be
          # 3-way merged, so -X theirs auto-resolves it to this run's version
          # (last-writer-wins is fine for a de-dup cache), and `rebase --abort` on
          # failure clears the unmerged state so the next retry can pull cleanly.
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash -X theirs origin "${GITHUB_REF_NAME}" \
                 && git push; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "push race — retry $i/5…"; sleep $((i * 2))
          done
          echo "push failed after retries"; exit 1
