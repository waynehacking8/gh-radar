name: send-job-radar (one-off)
# Reuses this repo's GMAIL_* secrets to run waynehacking8/job-radar once and email
# the Taiwan ML/GPU job digest. Temporary — added to trigger a single send.
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Clone job-radar and send the digest
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.GMAIL_USER }}
          SMTP_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          JOB_RADAR_HOME: jr-state
        run: |
          git clone --depth 1 https://github.com/waynehacking8/job-radar
          cd job-radar
          python radar.py
